enchantments.display.efficiency.short=Rompe bloques más rápido
enchantments.display.efficiency.description=<yellow>Eficiencia <gray>te permite romper bloques más rápido.<br>\
  <gray>Los niveles más altos permiten minar piedra, minerales y otros bloques más rápidamente.

enchantments.display.unbreaking.short=Dura más tiempo
enchantments.display.unbreaking.description=<yellow>Irrompibilidad <gray>hace que tus herramientas y armaduras duren más.<br>\
  <gray>No hace que los ítems sean indestructibles, pero se desgastarán más lentamente.

enchantments.display.mending.short>Repara con XP
enchantments.display.mending.description=<yellow>Reparación <gray>repara tus ítems automáticamente usando orbes de experiencia.<br>\
  <gray>Cuando ganas XP, parte de ella repara los ítems equipados o en la mano en lugar de añadir a tu nivel.

enchantments.display.silk_touch.short=Recoge bloques enteros
enchantments.display.silk_touch.description=<yellow>Toque de seda <gray>permite que los bloques suelten ellos mismos en lugar de los ítems usuales.<br>\
  <gray>Puedes recolectar bloques como piedra, minerales, vidrio y otros bloques delicados de forma segura.

enchantments.display.fortune.short=Obtén más ítems
enchantments.display.fortune.description=<yellow>Suerte <gray>aumenta la cantidad de ítems que sueltan los bloques, como minerales.<br>\
  <gray>Los niveles más altos dan mayor probabilidad de obtener múltiples ítems de un solo bloque.

enchantments.display.protection.short=Reduce el daño recibido
enchantments.display.protection.description=<yellow>Protección <gray>reduce la mayoría de tipos de daño que recibe el jugador.<br>\
  <gray>Ayuda a proteger contra ataques, explosiones, fuego y otros peligros.

enchantments.display.fire_protection.short=Reduce daño por fuego
enchantments.display.fire_protection.description=<yellow>Protección contra el fuego <gray>reduce el daño por fuego y lava.<br>\
  <gray>También acorta el tiempo que el jugador permanece en llamas.

enchantments.display.projectile_protection.short=Reduce daño por proyectiles
enchantments.display.projectile_protection.description=<yellow>Protección contra proyectiles <gray>reduce daño de flechas, tridentes y otros ataques a distancia.<br>\
  <gray>Esto hace que los enemigos a distancia sean menos peligrosos.

enchantments.display.feather_falling.short=Reduce daño por caída
enchantments.display.feather_falling.description=<yellow>Caída de pluma <gray>reduce el daño al caer desde alturas.<br>\
  <gray>Los niveles más altos permiten sobrevivir a caídas más grandes.

enchantments.display.respiration.short=Respira más tiempo bajo el agua
enchantments.display.respiration.description=<yellow>Respiración <gray>permite permanecer bajo el agua más tiempo antes de quedarse sin aire.<br>\
  <gray>También mejora ligeramente la visibilidad bajo el agua.

enchantments.display.aqua_affinity.short=Minería más rápida bajo el agua
enchantments.display.aqua_affinity.description=<yellow>Afinidad acuática <gray>elimina la penalización de velocidad al minar bajo el agua.<br>\
  <gray>Esto facilita la construcción y minería submarina.

enchantments.display.thorns.short=Daño a atacantes
enchantments.display.thorns.description=<yellow>Espinas <gray>da una probabilidad de dañar a los enemigos que golpean al jugador.<br>\
  <gray>Los atacantes pueden recibir daño cada vez que golpean en combate cuerpo a cuerpo.

enchantments.display.depth_strider.short=Muévete más rápido en agua
enchantments.display.depth_strider.description=<yellow>Nadador <gray>aumenta la velocidad de movimiento bajo el agua.<br>\
  <gray>Los niveles más altos facilitan nadar y moverse por el fondo del océano.

enchantments.display.frost_walker.short=Congela el agua en hielo
enchantments.display.frost_walker.description=<yellow>Pasos congelados <gray>convierte el agua cercana en hielo temporal al caminar sobre ella.<br>\
  <gray>Permite cruzar lagos, ríos y océanos de manera segura.

enchantments.display.sharpness.short=Aumenta daño de armas
enchantments.display.sharpness.description=<yellow>Filo <gray>aumenta el daño de espadas y hachas.<br>\
  <gray>Funciona contra todos los tipos de enemigos.

enchantments.display.smite.short=Daño extra a no-muertos
enchantments.display.smite.description=<yellow>Castigo <gray>aumenta el daño contra mobs no-muertos.<br>\
  <gray>Incluye zombis, esqueletos y el Wither.

enchantments.display.bane_of_arthropods.short=Daño extra a insectos
enchantments.display.bane_of_arthropods.description=<yellow>Azote de artrópodos <gray>aumenta daño a enemigos tipo araña.<br>\
  <gray>Especialmente efectivo contra arañas, arañas de cueva y silverfish.

enchantments.display.knockback.short=Empuja enemigos más lejos
enchantments.display.knockback.description=<yellow>Retroceso <gray>empuja a los enemigos más lejos al golpearlos.<br>\
  <gray>Ayuda a mantener distancia y evitar daño.

enchantments.display.fire_aspect.short=Prende fuego a los enemigos
enchantments.display.fire_aspect.description=<yellow>Aspecto ígneo <gray>prende fuego al objetivo al golpearlo.<br>\
  <gray>Si el objetivo es un animal que suelta carne cruda, esta se cocinará.

enchantments.display.looting.short=Aumenta drops de mobs
enchantments.display.looting.description=<yellow>Saqueo <gray>aumenta la cantidad de ítems que sueltan los mobs.<br>\
  <gray>Los niveles más altos mejoran la probabilidad de obtener ítems extra y raros.

enchantments.display.sweeping_edge.short=Ataques de barrido más fuertes
enchantments.display.sweeping_edge.description=<yellow>Borde de barrido <gray>aumenta el daño a enemigos cercanos durante un ataque de espada en barrido.<br>\
  <gray>Hace más efectiva la lucha contra grupos de mobs.

enchantments.display.power.short=Tiros de arco más fuertes
enchantments.display.power.description=<yellow>Poder <gray>aumenta el daño de flechas disparadas con arco.<br>\
  <gray>Los niveles más altos hacen cada disparo mucho más potente.

enchantments.display.punch.short=Empuja enemigos con flechas
enchantments.display.punch.description=<yellow>Puño <gray>hace que las flechas del arco empujen a los enemigos hacia atrás.<br>\
  <gray>Esto mantiene a los enemigos a distancia segura.

enchantments.display.flame.short=Flechas prenden fuego a enemigos
enchantments.display.flame.description=<yellow>Llama <gray>hace que las flechas disparadas prenden fuego a los enemigos.<br>\
  <gray>Si el objetivo es un animal que suelta carne cruda, esta se cocinará.

enchantments.display.infinity.short=Dispara flechas sin consumirlas
enchantments.display.infinity.description=<yellow>Infinidad <gray>permite disparar flechas sin consumirlas.<br>\
  <gray>El jugador solo necesita una flecha en su inventario.

enchantments.display.luck_of_the_sea.short=Mejor tesoro al pescar
enchantments.display.luck_of_the_sea.description=<yellow>Suerte del mar <gray>aumenta la probabilidad de conseguir tesoros valiosos al pescar.<br>\
  <gray>Incluye libros encantados, arcos y cañas de pescar.

enchantments.display.lure.short=Los peces muerden más rápido
enchantments.display.lure.description=<yellow>Imán <gray>reduce el tiempo para que los peces muerdan el anzuelo.<br>\
  <gray>Permite pescar más rápido.

enchantments.display.loyalty.short=El tridente regresa al lanzarlo
enchantments.display.loyalty.description=<yellow>Lealtad <gray>hace que un tridente lanzado regrese al jugador.<br>\
  <gray>Los niveles más altos hacen que regrese más rápido.

enchantments.display.impaling.short=Daño extra en agua
enchantments.display.impaling.description=<yellow>Empalamiento <gray>aumenta daño de tridentes.<br>\
  <gray>Especialmente efectivo contra mobs en agua o lluvia.

enchantments.display.riptide.short=Avanza al lanzar en agua
enchantments.display.riptide.description=<yellow>Riptide <gray>lanza al jugador hacia adelante al lanzar un tridente en agua o lluvia.<br>\
  <gray>Útil para viajar rápido por agua o volar durante tormentas.

enchantments.display.channeling.short=Invoca rayos
enchantments.display.channeling.description=<yellow>Canalización <gray>invoca un rayo cuando un tridente golpea un mob durante tormenta.<br>\
  <gray>Puede causar ataques de rayo poderosos a enemigos.

enchantments.display.multishot.short=Dispara múltiples flechas
enchantments.display.multishot.description=<yellow>Tiro múltiple <gray>dispara tres flechas a la vez desde una ballesta.<br>\
  <gray>Ayuda a golpear múltiples enemigos o aumentar la probabilidad de acertar.

enchantments.display.quick_charge.short=Recarga rápida de ballesta
enchantments.display.quick_charge.description=<yellow>Carga rápida <gray>reduce el tiempo de recarga de la ballesta.<br>\
  <gray>Los niveles más altos permiten disparar mucho más rápido.

enchantments.display.piercing.short=Flechas atraviesan enemigos
enchantments.display.piercing.description=<yellow>Perforación <gray>permite que las flechas de la ballesta atraviesen varios enemigos.<br>\
  <gray>Un solo disparo puede golpear varios objetivos en línea.

enchantments.display.density.short=Ataques de caída más fuertes
enchantments.display.density.description=<yellow>Densidad <gray>aumenta daño de ataques con maza al caer desde arriba.<br>\
  <gray>Cuanto mayor la caída, más fuerte el golpe.

enchantments.display.breach.short=Ignora parte de la armadura
enchantments.display.breach.description=<yellow>Brecha <gray>permite que los ataques ignoren parcialmente la armadura del enemigo.<br>\
  <gray>Esto ayuda a hacer más daño a mobs fuertemente armados.

enchantments.display.wind_burst.short=Empuja enemigos con aire
enchantments.display.wind_burst.description=<yellow>Ráfaga de viento <gray>crea una corriente de aire que empuja enemigos al atacar.<br>\
  <gray>Ayuda a controlar multitudes y mantener enemigos a distancia.

enchantments.display.soul_speed.short=Camina más rápido sobre arena de almas
enchantments.display.soul_speed.description=<yellow>Velocidad de alma <gray>aumenta velocidad al caminar sobre arena de almas o tierra de almas.<br>\
  <gray>Hace más rápido moverse por el Nether.

enchantments.display.swift_sneak.short=Muévete más rápido al agacharte
enchantments.display.swift_sneak.description=<yellow>Sigilo rápido <gray>aumenta velocidad mientras te agachas.<br>\
  <gray>Permite moverse más rápido sin perder velocidad al agacharse.

enchantments.display.lunge.short=Salta hacia adelante al atacar
enchantments.display.lunge.description=<yellow>Embestida <gray>permite saltar ligeramente hacia adelante al atacar un enemigo.<br>\
  <gray>Ayuda a cerrar distancias o alcanzar enemigos rápidamente.