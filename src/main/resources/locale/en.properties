# /MANAENCHANTS
commands.manaenchants.root.format=/manaenchants
commands.manaenchants.root.short=The core command for ManaEnchants.
commands.manaenchants.root.desc.1=Displays plugin information when used.
commands.manaenchants.help.format=/manaenchants help (page|query)
commands.manaenchants.help.short=View the list of commands per page, or look directly at a sub command.
commands.manaenchants.help.desc.1=These are all staff related commands, ask someone with more knowledge if you have any questions.
commands.manaenchants.config.format=/manaenchants config
commands.manaenchants.config.short=Displays details found in config.yml
commands.manaenchants.config.desc.1=This is view-only. Try click on each sound to test the sound out as well!
commands.manaenchants.item.format=/manaenchants item <action> <name>
commands.manaenchants.item.short=Allows admins to upload items so that it can be used within our enchanter UI
commands.manaenchants.item.desc.1=Names must be unique, and actions include: 'add', 'remove', 'info', 'give', 'replace', 'clear', 'list'
commands.manaenchants.reload.format=/manaenchants reload
commands.manaenchants.reload.short=Reloads data directly from config.yml
commands.manaenchants.reload.desc.1=If you have changed the EXP formula, it will recalculate the experience for everybody that is only to that formula!
commands.manaenchants.version.format=/manaenchants info
commands.manaenchants.version.short=Displays plugin information when used.
commands.manaenchants.version.desc.1=This includes the current version and the link to the latest version (if applicable)

# /ENCHANT
commands.enchant.root.format=/enchant
commands.enchant.root.short=Modify items or view enchant information.
commands.enchant.root.desc.1=When enchanting an item, ensure you are setting the level you will like the enchantment to be.
commands.enchant.help.format=/enchant help (page|query)
commands.enchant.help.short=View the list of commands per page, or look directly at a sub command.
commands.enchant.help.desc.1=If you have any questions about a command, feel free to ask someone!
commands.enchant.add.format=/enchant add (enchantment) <level>
commands.enchant.add.short=Adds an enchantment to your held item.
commands.enchant.add.desc.1=There are no limit to what you can add enchantments to.
commands.enchant.clear.format=/enchant clear
commands.enchant.clear.short=Removes all enchantments from your held item.
commands.enchant.clear.desc.1=If no enchantments are on the item, you will be sent an error message.
commands.enchant.info.format=/enchant info <enchantment>
commands.enchant.info.short=View enchantment details based on the enchantment or the item you are holding.
commands.enchant.info.desc.1=Some components in the message are hoverable and clickable, give it a try!
commands.enchant.list.format=/enchant list <page>
commands.enchant.list.short=View all the enchantments.
commands.enchant.list.desc.1=You can hover and click each enchantment if you wish to find out more information.
commands.enchant.remove.format=/enchant remove (enchantment)
commands.enchant.remove.short=Removes an enchantment from your held item.
commands.enchant.remove.desc.1=This command can only work if the enchantment is found on this item.
commands.enchant.set.format=/enchant set (enchantment) <level>
commands.enchant.set.short=Sets an enchantment level to your held item.
commands.enchant.set.desc.1=There are no limit to what you can add enchantments to.

# /XP
commands.xp.root.format=/xp
commands.xp.root.short=View EXP levels and points.
commands.xp.root.desc.1=You can also view the required EXP to the next level
commands.xp.help.format=/xp help (page|query)
commands.xp.help.short=View the list of commands per page, or look directly at a sub command.
commands.xp.help.desc.1=If you have any questions about a command, feel free to ask someone!
commands.xp.add.format=/xp add (player) <amount>
commands.xp.add.short=Adds XP to the player.
commands.xp.add.desc.1=Use '1l' for 1 level, or '100' for 100 experience points. Can only work for online players. 
commands.xp.clear.format=/xp clear (player)
commands.xp.clear.short=Resets this users experience levels.
commands.xp.clear.desc.1=Can only work for online players.
commands.xp.info.format=/xp info <player>
commands.xp.info.short=Displays experience info for this player.
commands.xp.info.desc.1=This includes their total experience points, and exp required for next level.
commands.xp.remove.format=/xp remove (player) <amount>
commands.xp.remove.short=Removes XP from the player.
commands.xp.remove.desc.1=Use '1l' for 1 level, or '100' for 100 experience points. Can only work for online players.
commands.xp.set.format=/xp set (player) (amount)
commands.xp.set.short=Sets XP for this player.
commands.xp.set.desc.1=Use '1l' for 1 level, or '100' for 100 experience points. Can only work for online players.