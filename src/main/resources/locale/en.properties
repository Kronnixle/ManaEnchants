enchantments.display.efficiency.short=Breaks blocks faster
enchantments.display.efficiency.description=<yellow>Efficiency <gray>increases the speed at which blocks are broken.

enchantments.display.unbreaking.short=Increases item durability
enchantments.display.unbreaking.description=<yellow>Unbreaking <gray>increases the effective durability of equipment.<br>\
  <gray>Despite its name, <yellow>Unbreaking</yellow> does not make items truly <i>unbreakable</i> - it simply allows items to last much longer.

enchantments.display.mending.short=Repairs items using experience
enchantments.display.mending.description=<yellow>Mending <gray>repairs items automatically using experience orbs collected by the player.<br>\
  <gray>When experience is gained, durability is <i>restored</i> instead of adding experience to the player's level, provided the enchanted item is equipped or held.

enchantments.display.silk_touch.short=Blocks drop themselves
enchantments.display.silk_touch.description=<yellow>Silk Touch <gray>allows blocks to drop themselves rather than their usual resources when mined.<br>\
  <gray>This makes it possible to collect blocks such as stone, ores, glass, and delicate blocks that would normally break or change when mined.

enchantments.display.fortune.short=Increases block drops
enchantments.display.fortune.description=<yellow>Fortune <gray>increases the number of resources dropped when mining blocks such as ores and other materials.<br>\
  <gray>Higher levels significantly improve the chance of receiving multiple drops from a single block, greatly increasing resource yields.



