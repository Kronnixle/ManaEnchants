# ============================================================
# ManaEnchants - tiered_enchants.yml
# ============================================================
#
# Delete this file if you wish to restore all values to
# their default values.
# CONFIG VERSION
#
# The plugin may use this value for future migrations.
#
config-version: 1
#
# ============================================================
# ENCHANT STRUCTURE OVERVIEW
# ============================================================
#
# enchants:
#   <enchant_key>:
#     enabled: true|false
#     rarity: COMMON|UNCOMMON|RARE|LEGENDARY
#
#     visibility:
#       mode: visible|hidden
#
#         visible  - Always shown in the enchant GUI.
#         hidden   - Not shown unless player already owns it.
#
#     applies_to: [LIST OF ITEM TYPES]
#       Defines which item categories this enchant can apply to.
#
#     max_level: <number> or -1 to have an infinite amount.
#
#     incompatibilities: [LIST OF ENCHANT KEYS]
#
# ============================================================
# COST MODES
# ============================================================
#
# costs:
#   mode: FORMULA | PER_LEVEL
#
# ------------------------------------------------------------
# MODE: FORMULA
# ------------------------------------------------------------
# Used for scalable enchants.
#
# Sections:
#
#   catalyst:
#     default:
#       material: <MATERIAL>
#       base: <int>
#       per_level: <int>
#       multiplier: <decimal>
#
#       Final amount formula: ((base + (level * per_level)) * multiplier)
#
#     overrides:
#       <level>:
#         material: <MATERIAL>
#         amount: <int>
#
#       Overrides take priority over formula for that level.
#
#   xp:
#     required_base_level: <int>        - How many XP levels this user must have to access this enchantment
#     required_per_level: <int>         - How many extra XP levels this user must have per enchantment level to access this enchantment.
#     formula: "2 + 2 * level",         - How many XP levels to take per enchantment upgrade
#
#   bookshelf:
#     mode: REQUIRED | TIERED | IGNORED
#
#     REQUIRED:
#       required:
#         base: <int>
#         per_level: <int>
#       required_shelves = base + (level * per_level)
#
#     TIERED:
#       tiers:
#         <level>: <required_shelves>
#
#     IGNORED:
#       No bookshelf requirement.
#
# ------------------------------------------------------------
# MODE: PER_LEVEL
# ------------------------------------------------------------
# Fully manual configuration.
#
# costs:
#   mode: PER_LEVEL
#   levels:
#     <level_number>:
#       base_xp: <int>            - The XP required for the user to access this enchantment.
#       catalyst:
#         material: <MATERIAL>    - Can use either MATERIAL or ITEM, but not both!
#         item: <STRING>          - Item must be found inside saved_items.yml
#         amount: <int>
#       xp: <int>
#       bookshelf: <int>
#
# max_level must match the highest defined level.
#
# ============================================================
# VALIDATION RULES
# ============================================================
#
# - Enchant keys must be unique.
# - max_level must be >= 1.
# - In PER_LEVEL mode, every level from 1 → max_level must exist.
# - In FORMULA mode, overrides cannot exceed max_level.
# - Materials must be valid Bukkit Material enums.
# - Incompatibilities should reference valid enchant keys.
#
# ============================================================
# NOTES
# ============================================================
#
# - Setting catalyst material to an unobtainable item (e.g. BARRIER)
#   effectively blocks upgrading that level.
#
# - Hidden enchants can still be upgraded if already present on the
#   upgraded item.
#
# - Anvil weight scaling can be found in the modified_anvil.yml
#
# - XP Formula can be found in config.yml, by default it has been
#   overwritten so every 75 EXP = 1 EXP level.
#
# ============================================================

