config-version: 1

sounds:
  error:
    key: minecraft:entity.wandering_trader.no
    volume: 1.0
    pitch: 1.0
    seed: 5
  click:
    key: minecraft:ui.button.click
    volume: 1.0
    pitch: 1.0
    seed: 1
  chat_notify:
    key: minecraft:block.note_block.chime
    volume: 1.0
    pitch: 1.0
    seed: 1
  success:
    key: minecraft:entity.villager.yes
    volume: 1.0
    pitch: 1.5
    seed: 2
  level_up:
    key: minecraft:entity.player.levelup
    volume: 1.0
    pitch: 1.0
    seed: 1

experience:
  # Enable or disable the custom XP system.
  # If false, the server uses vanilla Minecraft XP mechanics.
  enabled: true
  # Cost formulas per level.
  # Each entry applies to all levels >= min_level.
  # You only need one entry for a flat XP per level system.
  # Example formulas:
  #   Vanilla: "2 * level + 7", "5 * level - 38", "9 * level - 158"
  #   Flat: "100"
  #   Custom: "100 * level", "120 * level", etc.
  costs:
    - min_level: 0
      formula: "100"  # default flat XP per level
  # Level-up sound configuration.
  # Any valid Minecraft sound can be used.
  # If seed is -1, then any random seed will be used for this sound.
  sound:
    level_up: minecraft:entity.player.levelup
    volume: 1.0
    pitch: 1.0
    seed: -1
  # Defines the percent of total XP the player loses on death.
  # 100 = lose all XP, 0 = keep all XP.
  death_penalty: 100
  # Defines the percent of exp that is dropped on death.
  # 100 = drops 0 experience points from the remaining amount
  # ex. If the player has 100 EXP points, death_penalty is 50, and lost exp is 50, then the total dropped experience points is 25.
  lost_exp: 75