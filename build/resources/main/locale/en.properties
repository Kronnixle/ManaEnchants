enchantments.display.efficiency.short=Break blocks faster
enchantments.display.efficiency.description=<yellow>Efficiency <gray>makes you break blocks faster.<br>\
  <gray>Higher levels let you mine things like stone and ores more quickly.

enchantments.display.unbreaking.short=Lasts longer
enchantments.display.unbreaking.description=<yellow>Unbreaking <gray>makes your tools and armour last longer.<br>\
  <gray>It doesn’t make items unbreakable, but they will wear out more slowly.

enchantments.display.mending.short=Repairs with XP
enchantments.display.mending.description=<yellow>Mending <gray>repairs your items automatically using experience orbs.<br>\
  <gray>When you gain XP, some of it fixes your equipped or held items instead of adding to your level.

enchantments.display.silk_touch.short=Collect blocks whole
enchantments.display.silk_touch.description=<yellow>Silk Touch <gray>lets blocks drop themselves instead of their usual items.<br>\
  <gray>You can collect blocks like stone, ores, glass, and other delicate blocks safely.

enchantments.display.fortune.short=Get more drops
enchantments.display.fortune.description=<yellow>Fortune <gray>increases the amount of items dropped from blocks like ores.<br>\
  <gray>Higher levels give a better chance of getting multiple drops from a single block.

enchantments.display.protection.short=Reduces damage taken
enchantments.display.protection.description=<yellow>Protection <gray>reduces most types of damage taken by the player.<br>\
  <gray>It helps protect against attacks, explosions, fire, and other dangers.

enchantments.display.fire_protection.short=Reduces fire damage
enchantments.display.fire_protection.description=<yellow>Fire Protection <gray>reduces damage taken from fire and lava.<br>\
  <gray>It also shortens the time the player stays on fire.

enchantments.display.projectile_protection.short=Reduces projectile damage
enchantments.display.projectile_protection.description=<yellow>Projectile Protection <gray>reduces damage from arrows, tridents, and other flying attacks.<br>\
  <gray>This makes ranged enemies much less dangerous.

enchantments.display.feather_falling.short=Reduces fall damage
enchantments.display.feather_falling.description=<yellow>Feather Falling <gray>reduces damage taken when falling from heights.<br>\
  <gray>Higher levels allow players to survive much bigger falls.

enchantments.display.respiration.short=Breathe longer underwater
enchantments.display.respiration.description=<yellow>Respiration <gray>allows players to stay underwater longer before running out of air.<br>\
  <gray>It also slightly improves underwater visibility.

enchantments.display.aqua_affinity.short=Mine faster underwater
enchantments.display.aqua_affinity.description=<yellow>Aqua Affinity <gray>removes the mining speed penalty when breaking blocks underwater.<br>\
  <gray>This makes underwater building and mining much easier.

enchantments.display.thorns.short=Damages attacking enemies
enchantments.display.thorns.description=<yellow>Thorns <gray>gives a chance to damage enemies when they hit the player.<br>\
  <gray>Attackers may take damage each time they land a melee hit.

enchantments.display.depth_strider.short=Move faster in water
enchantments.display.depth_strider.description=<yellow>Depth Strider <gray>increases movement speed while walking underwater.<br>\
  <gray>Higher levels make it easier to swim and move across the ocean floor.

enchantments.display.frost_walker.short=Freezes water into ice
enchantments.display.frost_walker.description=<yellow>Frost Walker <gray>turns nearby water into temporary ice when the player walks over it.<br>\
  <gray>This allows players to safely walk across lakes, rivers and oceans.

enchantments.display.sharpness.short=Increases weapon damage
enchantments.display.sharpness.description=<yellow>Sharpness <gray>increases the damage dealt by swords and axes.<br>\
  <gray>It works against all types of enemies.

enchantments.display.smite.short=Extra damage to undead
enchantments.display.smite.description=<yellow>Smite <gray>increases damage against undead mobs.<br>\
  <gray>This includes enemies like zombies, skeletons, and the wither.

enchantments.display.bane_of_arthropods.short=Extra damage to bugs
enchantments.display.bane_of_arthropods.description=<yellow>Bane of Arthropods <gray>increases damage against spider-like enemies.<br>\
  <gray>It is especially effective against spiders, cave spiders, and silverfish.

enchantments.display.knockback.short=Pushes enemies farther away
enchantments.display.knockback.description=<yellow>Knockback <gray>causes enemies to be pushed farther away when hit.<br>\
  <gray>This helps create distance and makes it easier to avoid damage.

enchantments.display.fire_aspect.short=Sets enemies on fire
enchantments.display.fire_aspect.description=<yellow>Fire Aspect <gray>sets target on fire when they are hit.<br>\
  <gray>If the target is an animal that drops raw meat, this meat will become cooked.

enchantments.display.looting.short=Increases mob drops
enchantments.display.looting.description=<yellow>Looting <gray>increases the amount of items dropped by mobs.<br>\
  <gray>Higher levels improve the chance of receiving extra and rarer loot.

enchantments.display.sweeping_edge.short=Stronger sweeping attacks
enchantments.display.sweeping_edge.description=<yellow>Sweeping Edge <gray>increases the damage dealt to nearby enemies during a sweeping sword attack.<br>\
  <gray>This makes fighting groups of mobs more effective.

enchantments.display.power.short=Stronger bow shots
enchantments.display.power.description=<yellow>Power <gray>increases the damage dealt by arrows fired from a bow.<br>\
  <gray>Higher levels make each shot much more powerful.

enchantments.display.punch.short=Knocks enemies back with arrows
enchantments.display.punch.description=<yellow>Punch <gray>causes arrows from a bow to knock enemies backward.<br>\
  <gray>This helps keep enemies at a safe distance.

enchantments.display.flame.short=Arrows set enemies on fire
enchantments.display.flame.description=<yellow>Flame <gray>causes arrows shot from a bow to set enemies on fire.<br>\
  <gray>If the target is an animal that drops raw meat, this meat will become cooked.

enchantments.display.infinity.short=Shoot arrows without using them
enchantments.display.infinity.description=<yellow>Infinity <gray>allows a bow to shoot arrows without consuming them.<br>\
  <gray>The player only needs a single arrow in their inventory.

enchantments.display.luck_of_the_sea.short=Better fishing treasure
enchantments.display.luck_of_the_sea.description=<yellow>Luck of the Sea <gray>increases the chance of catching valuable treasure while fishing.<br>\
  <gray>This includes items like enchanted books, bows, and fishing rods.

enchantments.display.lure.short=Fish bite faster
enchantments.display.lure.description=<yellow>Lure <gray>reduces the time it takes for fish to bite the hook.<br>\
  <gray>This allows players to catch fish more quickly.

enchantments.display.loyalty.short=Trident returns after throwing
enchantments.display.loyalty.description=<yellow>Loyalty <gray>causes a thrown trident to return to the player.<br>\
  <gray>Higher levels make the trident return faster.

enchantments.display.impaling.short=Extra damage in water
enchantments.display.impaling.description=<yellow>Impaling <gray>increases the damage dealt by tridents.<br>\
  <gray>It is especially effective against mobs in water or rain.

enchantments.display.riptide.short=Launch forward in water
enchantments.display.riptide.description=<yellow>Riptide <gray>launches the player forward when a trident is thrown while in water or rain.<br>\
  <gray>This can be used to travel quickly through water or fly through the air during storms.

enchantments.display.channeling.short=Summons lightning
enchantments.display.channeling.description=<yellow>Channeling <gray>summons a lightning bolt when a trident hits a mob during a thunderstorm.<br>\
  <gray>This can cause powerful lightning strikes on enemies.

enchantments.display.multishot.short=Shoot multiple arrows
enchantments.display.multishot.description=<yellow>Multishot <gray>fires three arrows at once from a crossbow.<br>\
  <gray>This helps hit multiple enemies or increase the chance of landing a shot.

enchantments.display.quick_charge.short=Faster crossbow reload
enchantments.display.quick_charge.description=<yellow>Quick Charge <gray>reduces the time needed to reload a crossbow.<br>\
  <gray>Higher levels allow players to fire shots much more quickly.

enchantments.display.piercing.short=Arrows pass through enemies
enchantments.display.piercing.description=<yellow>Piercing <gray>allows crossbow arrows to pass through multiple enemies.<br>\
  <gray>A single shot can hit several targets in a line.

enchantments.display.density.short=Stronger falling attacks
enchantments.display.density.description=<yellow>Density <gray>increases the damage of mace attacks when falling from above.<br>\
  <gray>The higher the fall, the stronger the hit becomes.

enchantments.display.breach.short=Ignores some armor
enchantments.display.breach.description=<yellow>Breach <gray>allows attacks to partially ignore the enemy’s armour.<br>\
  <gray>This helps deal more damage to heavily armoured mobs.

enchantments.display.wind_burst.short=Pushes enemies with air
enchantments.display.wind_burst.description=<yellow>Wind Burst <gray>creates a gust of air that pushes enemies back when attacking.<br>\
  <gray>This can help control crowds and keep enemies away.

enchantments.display.soul_speed.short=Walk faster on soul sand
enchantments.display.soul_speed.description=<yellow>Soul Speed <gray>increases movement speed when walking on soul sand or soul soil.<br>\
  <gray>This makes navigating the Nether much faster.

enchantments.display.swift_sneak.short=Move faster while sneaking
enchantments.display.swift_sneak.description=<yellow>Swift Sneak <gray>increases movement speed while sneaking.<br>\
  <gray>It allows players to sneak more quickly without slowing down.

enchantments.display.lunge.short=Leap forward when attacking
enchantments.display.lunge.description=<yellow>Lunge <gray>lets the player jump forward slightly when striking an enemy.<br>\
  <gray>This can help close gaps or reach enemies quickly.

