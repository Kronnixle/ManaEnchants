commands.xp.remove.desc.1=Use '1l' for 1 level, or '100' for 100 experience points. Can only work for online players.
commands.xp.set.format=/xp set (player) (amount)
commands.xp.set.short=Sets XP for this player.
commands.xp.set.desc.1=Use '1l' for 1 level, or '100' for 100 experience points. Can only work for online players.