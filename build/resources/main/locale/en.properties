commands.enchant.root.format=/enchant
commands.enchant.root.short=Modify items or view enchant information.
commands.enchant.root.desc.1=When enchanting an item, ensure you are setting the level you will like the enchantment to be.
commands.enchant.help.format=/enchant help (page|query)
commands.enchant.help.short=View the list of commands per page, or look directly at a sub command.
commands.enchant.help.desc.1=If you have any questions about a command, feel free to ask someone!
commands.enchant.add.format=/enchant add (enchantment) <level>
commands.enchant.add.short=Adds an enchantment to your held item.
commands.enchant.add.desc.1=There are no limit to what you can add enchantments to.
commands.enchant.clear.format=/enchant clear
commands.enchant.clear.short=Removes all enchantments from your held item.
commands.enchant.clear.desc.1=If no enchantments are on the item, you will be sent an error message.
commands.enchant.info.format=/enchant info <enchantment>
commands.enchant.info.short=View enchantment details based on the enchantment or the item you are holding.
commands.enchant.info.desc.1=Some components in the message are hoverable and clickable, give it a try!
commands.enchant.list.format=/enchant list <page>
commands.enchant.list.short=View all the enchantments.
commands.enchant.list.desc.1=You can hover and click each enchantment if you wish to find out more information.
commands.enchant.remove.format=/enchant remove (enchantment)
commands.enchant.remove.short=Removes an enchantment from your held item.
commands.enchant.remove.desc.1=This command can only work if the enchantment is found on this item.
commands.enchant.set.format=/enchant set (enchantment) <level>
commands.enchant.set.short=Sets an enchantment level to your held item.
commands.enchant.set.desc.1=There are no limit to what you can add enchantments to.

